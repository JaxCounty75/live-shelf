ri<!DOCTYPE html>
<html>
<head>
  <title>Live Shelf</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 50px;
    }
    .shelf {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 30px;
    }
    .item {
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }
    button {
      padding: 10px 20px;
      margin-top: 20px;
      border: none;
      border-radius: 5px;
      background: #00c3ff;
      color: black;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Live Shelf</h1>
  <p>Your digital life, stored safely.</p>

<button onclick="document.getElementById('fileInput').click()">+ Add to Shelf</button>
<input type="file" id="fileInput" onchange="uploadItem()" style="display:none;" />

<div class="shelf" id="shelf"></div>

<script>
  function uploadItem(event) {
  const fileInput = event.target;
<input type="file" id="fileInput" onchange="uploadItem(event)" style="display:none;" />

  if (fileInput.files.length === 0) {
    alert("Choose a file first");
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = e.target.result;

    let items = JSON.parse(localStorage.getItem("shelfItems")) || [];
    items.push(data);
    localStorage.setItem("shelfItems", JSON.stringify(items));

    displayItem(data);
  };

  reader.readAsDataURL(file);
}

function displayItem(data) {
  const shelf = document.getElementById("shelf");
  const item = document.createElement("div");
  item.className = "item";

  const img = document.createElement("img");
  img.src = data;
  img.style.width = "100%";

  item.appendChild(img);
  shelf.appendChild(item);
}

window.onload = function() {
  const items = JSON.parse(localStorage.getItem("shelfItems")) || [];
  items.forEach(displayItem);
};
    </script>
   </body>
</html>

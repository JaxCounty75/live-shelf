ri<!DOCTYPE html>
<html>
<head>
  <title>Live Shelf</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 50px;
    }
    .shelf {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 30px;
    }
    .item {
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }
    button {
  padding: 14px 24px;
  font-size: 16px;
  margin-top: 25px;
  border-radius: 8px;
  background: #00c3ff;
  color: black;
  cursor: pointer;
    }
    
  </style>
</head>
<body>

  <h1>Live Shelf</h1>
  <input type="file" id="fileInput" style="display:none;" onchange="uploadItem()">

<button onclick="document.getElementById('fileInput').click()">
  + Add to Shelf
</button>

<div class="shelf" id="shelf"></div>

<script>
function uploadItem() {
  const fileInput = document.getElementById("fileInput");

  if (fileInput.files.length === 0) {
    alert("Choose a file first");
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = e.target.result;

    let items = JSON.parse(localStorage.getItem("shelfItems")) || [];
    items.push(data);
    localStorage.setItem("shelfItems", JSON.stringify(items));

    displayItem(data);
  };

  reader.readAsDataURL(file);
}

function displayItem(data) {
  const shelf = document.getElementById("shelf");
  const item = document.createElement("div");
  item.className = "item";

  const img = document.createElement("img");
  img.src = data;
  img.style.width = "100%";

  item.appendChild(img);
  shelf.appendChild(item);
}

window.onload = function() {
  const items = JSON.parse(localStorage.getItem("shelfItems")) || [];
  <input type="file" id="fileInput" style="display:none;" onchange="uploadItem()">
</script>
</body>
</html>

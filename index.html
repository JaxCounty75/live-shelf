<!DOCTYPE html>
<html>
<head>
<title>Live Shelf</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 30px;
}

button {
  padding: 14px 24px;
  font-size: 16px;
  margin: 20px;
  border-radius: 8px;
  background: #00c3ff;
  color: black;
  cursor: pointer;
  border: none;
}

.shelf {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.item {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  position: relative;
}

.item img {
  width: 100%;
  border-radius: 6px;
}

.delete {
  position: absolute;
  top: 5px;
  right: 5px;
  background: red;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  padding: 5px;
}
</style>
</head>

<body>

<h1>Live Shelf</h1>

<input type="file" id="fileInput" multiple style="display:none;">

<button onclick="document.getElementById('fileInput').click()">
  + Add to Shelf
</button>

<div class="shelf" id="shelf"></div>

<script>
const fileInput = document.getElementById("fileInput");

fileInput.addEventListener("change", function () {
  const files = fileInput.files;

  for (let i = 0; i < files.length; i++) {
    const reader = new FileReader();

    reader.onload = function (e) {
      const data = e.target.result;

      let items = JSON.parse(localStorage.getItem("shelfItems")) || [];
      items.push(data);
      localStorage.setItem("shelfItems", JSON.stringify(items));

      displayItem(data);
    };

    reader.readAsDataURL(files[i]);
  }
});

function displayItem(data, index) {
  const shelf = document.getElementById("shelf");

  const item = document.createElement("div");
  item.className = "item";

  const img = document.createElement("img");
  img.src = data;

  const del = document.createElement("button");
  del.innerText = "X";
  del.className = "delete";

  del.onclick = function () {
    item.remove();

    let items = JSON.parse(localStorage.getItem("shelfItems")) || [];
    items.splice(index, 1);
    localStorage.setItem("shelfItems", JSON.stringify(items));
  };

  item.appendChild(img);
  item.appendChild(del);
  shelf.appendChild(item);
}

window.onload = function () {
  const items = JSON.parse(localStorage.getItem("shelfItems")) || [];
  items.forEach((data, index) => displayItem(data, index));
};
</script>

</body>
</html>

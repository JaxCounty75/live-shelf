<!DOCTYPE html>
<html>
<head>
  <title>Live Shelf Secure</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .shelf {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 30px;
    }

    .item {
      position: relative;
      background: #222;
      padding: 10px;
      border-radius: 10px;
    }

    .item img {
      width: 100%;
      border-radius: 8px;
    }

    .remove {
      position: absolute;
      top: 5px;
      right: 5px;
      background: red;
      border: none;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
    }

    .notice {
      margin-top: 15px;
      font-size: 14px;
      color: #aaa;
    }

    button {
      padding: 14px 24px;
      margin-top: 20px;
      background: #00c3ff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Live Shelf</h1>
<p>Upload → stored safely → remove from phone manually</p>

<input type="file" id="fileInput" multiple style="display:none;">
<button onclick="document.getElementById('fileInput').click()">
  + Upload to Secure Shelf
</button>

<div class="notice">
  After upload: you can safely delete the original from your phone 📱
</div>

<div class="shelf" id="shelf"></div>

<script>
document.getElementById("fileInput").addEventListener("change", uploadItem);

async function uploadItem() {
  const files = document.getElementById("fileInput").files;

  for (let file of files) {
    const formData = new FormData();
    formData.append("image", file);

    const res = await fetch("https://api.imgur.com/3/image", {
      method: "POST",
      headers: {
        Authorization: "Client-ID YOUR_CLIENT_ID"
      },
      body: formData
    });

    const data = await res.json();
    const url = data.data.link;

    let items = JSON.parse(localStorage.getItem("shelfItems")) || [];
    items.push(url);
    localStorage.setItem("shelfItems", JSON.stringify(items));

    displayItem(url, items.length - 1);
  }
}

function displayItem(url, index) {
  const shelf = document.getElementById("shelf");

  const item = document.createElement("div");
  item.className = "item";

  const img = document.createElement("img");
  img.src = url;

  const remove = document.createElement("button");
  remove.className = "remove";
  remove.innerText = "×";

  remove.onclick = () => {
    let items = JSON.parse(localStorage.getItem("shelfItems")) || [];
    items.splice(index, 1);
    localStorage.setItem("shelfItems", JSON.stringify(items));
    reload();
  };

  item.appendChild(img);
  item.appendChild(remove);
  shelf.appendChild(item);
}

function reload() {
  const shelf = document.getElementById("shelf");
  shelf.innerHTML = "";
  const items = JSON.parse(localStorage.getItem("shelfItems")) || [];
  items.forEach((url, i) => displayItem(url, i));
}

window.onload = reload;
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Live Shelf</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 50px;
    }
    .shelf {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 30px;
    }
    .item {
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }
    button {
      padding: 10px 20px;
      margin-top: 20px;
      border: none;
      border-radius: 5px;
      background: #00c3ff;
      color: black;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Live Shelf</h1>
  <p>Your digital life, stored safely.</p>

  <input type="file" id="fileInput" />
<button onclick="uploadItem()">Add to Shelf</button>

  <div class="shelf" id="shelf"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCB8Zq2n6J8wJPtFptgzO7BEAE5YL-wQJg",
  authDomain: "live-shelf-812d6.firebaseapp.com",
  projectId: "live-shelf-812d6",
  storageBucket: "live-shelf-812d6.firebasestorage.app",
  messagingSenderId: "354914306246",
  appId: "1:354914306246:web:be0739942e2b483620efc7"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

function uploadItem() {
  const fileInput = document.getElementById("fileInput");
  const shelf = document.getElementById("shelf");

  if (fileInput.files.length === 0) {
    alert("Choose a file first");
    return;
  }

  const file = fileInput.files[0];
  const storageRef = storage.ref("uploads/" + file.name);

  storageRef.put(file).then(snapshot => {
    snapshot.ref.getDownloadURL().then(url => {
      const item = document.createElement("div");
      item.className = "item";

      if (file.type.startsWith("image/")) {
        const img = document.createElement("img");
        img.src = url;
        img.style.width = "100%";
        item.appendChild(img);
      } else {
        item.innerText = file.name;
      }

      shelf.appendChild(item);
    });
  });
}
</script>

</body>
</html>
